app:
  name: standard-document-assistant
  default_language: zh-CN

models:
  primary:
    provider: qwen
    class: langchain_qwq.ChatQwen
    model: qwen3.7-max
    temperature: 0
    max_tokens: 8000
    timeout: 60
    max_retries: 2

runtime:
  streaming: true
  transport: sse
  require_human_approval: true
  default_thread_prefix: standard-doc

workspace:
  uploads_dir: workspace/input/uploads
  output_dir: workspace/output
  tmp_dir: workspace/tmp
  max_upload_size_mb: 100
  allowed_upload_suffixes:
    - .pdf
    - .docx
    - .md
    - .markdown
    - .txt

mineru:
  # local: 兼容自建 MinerU /file_parse；precise: mineru.net 精准解析 API。
  api_mode: local
  api_base_url: ""
  precise_base_url: https://mineru.net
  precise_model_version: vlm
  precise_poll_interval: 3
  precise_poll_timeout: 600
  precise_extra_formats: []
  request_timeout: 600
  max_pdf_size_mb: 100
  return_images: true
  save_zip_archive: true
  save_middle_json: false
  save_content_list: false
  skip_if_zip_exists: true
  output_subdir: ""
  request_options:
    backend: pipeline
    lang_list: ch
    parse_method: auto
    formula_enable: "true"
    table_enable: "true"
    return_middle_json: "true"
    return_content_list: "true"
    response_format_zip: "true"

metadata_extraction:
  default_scope_mode: metadata
  scoped_text_max_bytes: 524288
  strict_validation: false
  write_artifacts: true
  model:
    provider: dashscope-compatible
    model: qwen3.5-flash
    base_url: ""
    timeout: 120
    max_retries: 2
    batch_length: 40
    max_workers: 20
    max_char_buffer: 1000
    extraction_passes: 1

standard_review:
  # 规则源 / 索引目录（绝对或相对项目根的相对路径均可）
  rules_md: src/standard_document_assistant/resources/review_rules/rules_test.md
  index_dir: src/standard_document_assistant/resources/review_rules

  # 召回与回环
  top_k: 8
  max_review_rounds: 2
  auto_rebuild_index: true
  write_artifacts: true
  output_subdir: ""
  enable_llm_review: true
  scoped_text_max_chars: 12000

  # 报告摘要
  enable_audit_summary: true
  summary_model: qwen3.5-flash
  summary_max_chars: 600

  # LLM Judge
  judge_provider: dashscope-compatible
  judge_model: qwen3.5-flash          # 环境变量 DASHSCOPE_JUDGE_MODEL 可覆盖
  judge_base_url: ""                  # 环境变量 DASHSCOPE_BASE_URL 可覆盖
  judge_api_key_env: DASHSCOPE_API_KEY
  judge_temperature: 0.0
  judge_max_tokens: 2048
  judge_timeout: 60
  judge_max_retries: 2
  judge_max_workers: 4                # 异步并发 Semaphore

  # Embedding / 索引
  embedding_provider: dashscope
  embedding_model: text-embedding-v3  # 环境变量 DASHSCOPE_EMBEDDING_MODEL 可覆盖
  embedding_base_url: ""              # 环境变量 DASHSCOPE_BASE_URL 可覆盖
  embedding_dim: 1024
  embedding_api_key_env: DASHSCOPE_API_KEY

  # 上下文裁剪
  local_context_max_chars: 2200
  cross_section_max_chars: 3200
  window_max_chars: 2200
  window_overlap_chars: 160
  full_document_single_chars: 2200
  batch_window_max_rules: 4
  batch_window_max_chars: 3600
  batch_scope_max_rules: 4
  batch_scope_max_chars: 3600
  min_context_chars_local: 40
  min_context_chars_cross_section: 120
  min_context_chars_full_document: 400

  # 置信度降级
  low_confidence_floor: 0.35

memory:
  checkpointer: memory
  store: inmemory
  agent_memory_namespace: standard-document-assistant
  routes:
    short_term: state
    workspace: filesystem
    long_term: store
